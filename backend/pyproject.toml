[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[dependency-groups]
dev = [
    "fastapi>=0.136.1",
    "httpx>=0.28.1",
    "loguru>=0.7.3",
    "mypy>=2.0.0",
    "openai>=2.36.0",
    "pydantic>=2.0",
    "python-dotenv>=1.2.2",
    "ruff>=0.15.12",
    "sse-starlette>=3.4.3",
    "tavily-python>=0.7.24",
    "uvicorn[standard]>=0.46.0",
]
